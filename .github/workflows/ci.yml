name: KnowledgeOS CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Cancel any in-progress run on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '20'
  # Shared CI secrets (not real keys — just enough to satisfy config validation)
  JWT_SECRET: ci-test-jwt-secret-must-be-at-least-32-chars
  JWT_REFRESH_SECRET: ci-test-refresh-jwt-secret-at-least-32-chars
  MONGODB_URL: mongodb://localhost:27017
  MONGODB_DB_NAME: knowledge_os_ci
  REDIS_URL: redis://localhost:6379
  QDRANT_URL: http://localhost:6333
  LLM_PROVIDER: huggingface
  GEMINI_API_KEY: ci-placeholder-gemini
  HUGGINGFACE_API_KEY: ci-placeholder-hf
  LLAMAPARSE_API_KEY: ci-placeholder-llama
  EMBEDDING_MODEL_NAME: all-MiniLM-L6-v2
  QDRANT_COLLECTION_NAME: knowledge_vectors

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # JOB 1: Backend Unit Tests (no Docker, pure mocked unit tests)
  # Runs on every push. Fast (~30s). Uses AsyncMock to fake all DBs.
  # ═══════════════════════════════════════════════════════════════════
  test-backend-unit:
    name: 🧪 Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install uv package manager
        run: pip install uv

      - name: Create venv & install backend deps + test tools
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -r requirements.txt pytest pytest-asyncio httpx anyio
        working-directory: backend

      - name: Run unit tests (mocked DBs — no Docker needed)
        run: |
          source .venv/bin/activate
          python -m pytest tests/ test_backend.py -v --tb=short \
            --junit-xml=../test-results/unit-tests.xml
        working-directory: backend
        env:
          JWT_SECRET: ${{ env.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          MONGODB_URL: ${{ env.MONGODB_URL }}
          MONGODB_DB_NAME: ${{ env.MONGODB_DB_NAME }}
          REDIS_URL: ${{ env.REDIS_URL }}
          QDRANT_URL: ${{ env.QDRANT_URL }}
          LLM_PROVIDER: ${{ env.LLM_PROVIDER }}
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ env.HUGGINGFACE_API_KEY }}
          LLAMAPARSE_API_KEY: ${{ env.LLAMAPARSE_API_KEY }}
          EMBEDDING_MODEL_NAME: ${{ env.EMBEDDING_MODEL_NAME }}
          QDRANT_COLLECTION_NAME: ${{ env.QDRANT_COLLECTION_NAME }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/unit-tests.xml

  # ═══════════════════════════════════════════════════════════════════
  # JOB 2: Backend Integration Tests (live Docker services)
  # Spins up MongoDB, Redis, Qdrant via service containers.
  # Runs the full E2E suite against the real API.
  # ═══════════════════════════════════════════════════════════════════
  test-backend-integration:
    name: 🔗 Backend Integration Tests (Live Services)
    runs-on: ubuntu-latest
    needs: test-backend-unit

    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8.0-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.10.1
        ports:
          - 6333:6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install uv package manager
        run: pip install uv

      - name: Create venv & install all dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -r requirements.txt pytest pytest-asyncio httpx anyio
        working-directory: backend

      - name: Start backend API server
        run: |
          source .venv/bin/activate
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/backend.pid
          # Wait for backend to be healthy
          for i in $(seq 1 20); do
            sleep 2
            curl -sf http://localhost:8000/healthz && echo "Backend ready!" && break
            echo "Attempt $i: Backend not ready yet..."
          done
        working-directory: backend
        env:
          JWT_SECRET: ${{ env.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          MONGODB_URL: ${{ env.MONGODB_URL }}
          MONGODB_DB_NAME: ${{ env.MONGODB_DB_NAME }}
          REDIS_URL: ${{ env.REDIS_URL }}
          QDRANT_URL: ${{ env.QDRANT_URL }}
          LLM_PROVIDER: ${{ env.LLM_PROVIDER }}
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ env.HUGGINGFACE_API_KEY }}
          LLAMAPARSE_API_KEY: ${{ env.LLAMAPARSE_API_KEY }}
          EMBEDDING_MODEL_NAME: ${{ env.EMBEDDING_MODEL_NAME }}
          QDRANT_COLLECTION_NAME: ${{ env.QDRANT_COLLECTION_NAME }}

      - name: Wait for Qdrant service readiness
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:6333/healthz && echo "Qdrant ready!" && break
            echo "Waiting for Qdrant (Attempt $i)..."
            sleep 2
          done

      - name: Create Qdrant collection
        run: |
          curl -X PUT http://localhost:6333/collections/knowledge_vectors \
            -H "Content-Type: application/json" \
            -d '{"vectors": {"size": 384, "distance": "Cosine"}}'

      - name: Run E2E integration tests
        run: |
          source .venv/bin/activate
          python test_e2e_live.py --base-url http://localhost:8000
        working-directory: backend
        env:
          JWT_SECRET: ${{ env.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          MONGODB_URL: ${{ env.MONGODB_URL }}
          MONGODB_DB_NAME: ${{ env.MONGODB_DB_NAME }}
          REDIS_URL: ${{ env.REDIS_URL }}
          QDRANT_URL: ${{ env.QDRANT_URL }}
          LLM_PROVIDER: ${{ env.LLM_PROVIDER }}
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ env.HUGGINGFACE_API_KEY }}
          LLAMAPARSE_API_KEY: ${{ env.LLAMAPARSE_API_KEY }}
          EMBEDDING_MODEL_NAME: ${{ env.EMBEDDING_MODEL_NAME }}
          QDRANT_COLLECTION_NAME: ${{ env.QDRANT_COLLECTION_NAME }}

      - name: Print backend logs on failure
        if: failure()
        run: |
          echo "=== Backend stdout/stderr ==="
          cat /tmp/nohup.out 2>/dev/null || true

  # ═══════════════════════════════════════════════════════════════════
  # JOB 3: Frontend Build
  # ═══════════════════════════════════════════════════════════════════
  test-frontend:
    name: 🎨 Frontend Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build production bundle
        run: npm run build
        working-directory: frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════
  # JOB 4: Docker Image Build & Push (only on main branch)
  # Builds backend + worker images and pushes to GitHub Container Registry
  # ═══════════════════════════════════════════════════════════════════
  docker-build-push:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ test-backend-integration, test-frontend ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend image
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Extract metadata for worker image
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/worker
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

  # ═══════════════════════════════════════════════════════════════════
  # JOB 5: Security Audit (runs in parallel, non-blocking)
  # ═══════════════════════════════════════════════════════════════════
  security-scan:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run pip-audit on backend
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --skip-editable -f json -o security-backend.json
        continue-on-error: true

      - name: Run pip-audit on workers
        run: |
          pip-audit -r workers/requirements.txt --skip-editable -f json -o security-workers.json
        continue-on-error: true

      - name: Set up Node for npm audit
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit on frontend
        run: npm audit --audit-level=high --json > ../security-frontend.json || true
        working-directory: frontend
        continue-on-error: true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: |
            security-backend.json
            security-workers.json
            security-frontend.json
          if-no-files-found: ignore
