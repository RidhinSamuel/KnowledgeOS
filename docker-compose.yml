services:
  mongodb:
    image: mongo:8.0
    container_name: knowledge_mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    ports:
      - "127.0.0.1:27017:27017" # Securely bind to localhost only
    networks:
      - knowledge-net

  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: knowledge_valkey
    restart: unless-stopped
    command: valkey-server --save 60 1 --loglevel warning --appendonly yes
    volumes:
      - valkey_data:/data
    ports:
      - "127.0.0.1:6379:6379" # Securely bind to localhost only
    networks:
      - knowledge-net

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: knowledge_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333" # Securely bind to localhost only
    networks:
      - knowledge-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: knowledge_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://valkey:6379
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - mongodb
      - valkey
      - qdrant
    networks:
      - knowledge-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: knowledge_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://valkey:6379
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - mongodb
      - valkey
      - qdrant
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - knowledge-net

  nginx:
    image: nginx:alpine
    container_name: knowledge_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - knowledge-net

  prometheus:
    image: prom/prometheus:latest
    container_name: knowledge_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - knowledge-net

  grafana:
    image: grafana/grafana:latest
    container_name: knowledge_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - knowledge-net

networks:
  knowledge-net:
    driver: bridge

volumes:
  mongodb_data:
  valkey_data:
  qdrant_data:
